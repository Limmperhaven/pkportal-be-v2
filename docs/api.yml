openapi: 3.0.3
info:
  version: 0.1.0
  title: Swagger PKPortal - OpenAPI 3.0
  description: Описание API для бекенда портала школы "Покровский Квартал"

tags:
  - name: Auth
    description: Операции связанные с авторизацией
  - name: User
    description: Операции над пользователями
  - name: TestDate
    description: Операции над датами тестирования
  - name: Profiles
    description: Операции над учебными профилями
  - name: Subjects
    description: Операции над школьными предметами
  - name: ForeignLanguages
    description: Операции над иностранными языками
paths:
  /auth/sign-up:
    post:
      tags:
        - Auth
      summary: Регистрация
      description: Регистрация нового пользователя
      operationId: signUp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUp'
        required: true
      responses:
        200:
          description: Пользователь успешно добавлен
        400:
          description: Ошибка валидации
        500:
          description: Ошибка сервера
  /auth/sign-in:
    post:
      tags:
        - Auth
      summary: Авторизация
      description: Авторизация пользователя
      operationId: signIn
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignIn'
        required: true
      responses:
        200:
          description: Авторизация прошла успешно
        400:
          description: Ошибка валидации
        403:
          description: Неверный логин/пароль
        500:
          description: Ошибка сервера
  /auth/recover/{email}:
    post:
      tags:
        - Auth
      summary: Восстановление пароля
      description: Восстановление забытого пароля
      operationId: recover
      parameters:
        - name: email
          in: path
          description: Email пользователя для восстановления пароля
          required: true
          schema:
            type: string
            format: email
      responses:
        200:
          description: Письмо с восстановлением отправлено
        404:
          description: Пользователь с таким email не найден
        500:
          description: Ошибка сервера
  /auth/activate/{activationLink}:
    get:
      tags:
        - Auth
      summary: Активация аккаунта
      description: Эндпоинт для активации через активационное письмо email
      operationId: activate
      parameters:
        - name: activationLink
          in: path
          description: Активационный url
          required: true
          schema:
            type: string
      responses:
        200:
          description: ОК
        404:
          description: Пользователь с таким ActivationLink не найден
        500:
          description: Ошибка сервера
  /user/create:
    post:
      tags:
        - User
      summary: Создание пользователя
      description: Эндпоинт для добавления администрацией нового пользователя
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUp'
      responses:
        200:
          description: Создание прошло успешно
        400:
          description: Ошибка валидации
        500:
          description: Ошибка сервера
  /user/byId/{id}:
    get:
      tags:
        - User
      summary: Получение пользователя
      description: Эндпоинт для получения администрацией полной информации о пользователе по id
      operationId: getUserById
      parameters:
        - name: id
          in: path
          description: Id пользователя
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFull'
        404:
          description: Пользователь с таким id не найден
        500:
          description: Ошибка сервера
    put:
      tags:
        - User
      summary: Обновление личных данных пользователя
      description: Эндпоинт для обновления администрацией личной информации о пользователе по id
      operationId: updateUserById
      parameters:
        - name: id
          in: path
          description: Id пользователя
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInfo'
        required: true
      responses:
        200:
          description: Пользователь успешно обновлен
        404:
          description: Пользователь с таким id не найден
        500:
          description: Ошибка сервера
  /user/list:
    get:
      tags:
        - User
      summary: Получение списка пользователей
      description: Эндпоинт для получения администрацией списка пользователей
      operationId: listUsers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserListRequest'
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserFull'
        404:
          description: Пользователь с таким id не найден
        500:
          description: Ошибка сервера
  /user/me:
    get:
      tags:
        - User
      summary: Получение информации о себе
      description: Эндпоинт для получения пользователем полной информации о себе
      operationId: getMe
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFull'
        404:
          description: Пользователь с таким id не найден
        500:
          description: Ошибка сервера
    put:
      tags:
        - User
      summary: Обновление собственных личных данных
      description: Эндпоинт для обновления собственной личной информации
      operationId: updateMe
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInfo'
        required: true
      responses:
        200:
          description: Пользователь успешно обновлен
        404:
          description: Пользователь с таким id не найден
        500:
          description: Ошибка сервера
  /td/create:
    post:
      tags:
        - TestDate
      summary: Создание даты тестирования
      description: Эндпоинт для добавления администрацией новой даты тестирования
      operationId: createTestDate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestDate'
      responses:
        200:
          description: Создание прошло успешно
        400:
          description: Ошибка валидации
        500:
          description: Ошибка сервера
  /td/byId/{id}:
    get:
      tags:
        - TestDate
      summary: Получение даты тестирования
      description: Эндпоинт для получения администрацией полной информации о дате тестирования
      operationId: getTdById
      parameters:
        - name: id
          in: path
          description: Id даты тестирования
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDateFull'
        404:
          description: Дата тестирования с таким Id не найдена
        500:
          description: Ошибка сервера
    put:
      tags:
        - TestDate
      summary: Обновление даты тестирования ???
      description: Эндпоинт для обновления администрацией информации о дате тестирования
      operationId: updateTdById
      parameters:
        - name: id
          in: path
          description: Id даты тестирования
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestDate'
      responses:
        200:
          description: ОК
        404:
          description: Дата тестирования с таким Id не найдена
        500:
          description: Ошибка сервера
  /td/setStatus/{id}/{status}:
    post:
      tags:
        - TestDate
      summary: Установить новый статус
      description: Эндпоинт для установки администрацией нового статуса тестирования
      operationId: setTestDateStatus
      parameters:
        - name: id
          in: path
          description: Id даты тестирования
          required: true
          schema:
            type: integer
            format: int64
        - name: status
          in: path
          description: Статус отображения даты тестирования
          required: true
          schema:
            type: string
            enum:
              - hidden
              - shown
      responses:
        200:
          description: Статус успешно изменен
        404:
          description: Дата тестирования с таким Id не найдена
        500:
          description: Ошибка сервера
  /td/list:
    get:
      tags:
        - TestDate
      summary: Получить список всех дат тестирования
      description: Эндпоинт для получения администрацией всех дат тестирования с фильтрацией
      operationId: listTd
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestDateListRequest'
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDateFullArray'
        400:
          description: Ошибка валидации
        500:
          description: Ошибка сервера
  /td/listAvailable:
    get:
      tags:
        - TestDate
      summary: Получить список доступных абитуриенту дат тестирования
      description: Эндпоинт для получения абитуриентом доступных для записи дат тестирования
      operationId: listAvailableTd
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDateFullArray'
        400:
          description: Ошибка валидации
        500:
          description: Ошибка сервера
  /td/signUpUser/{userId}/{tdId}:
    post:
      tags:
        - TestDate
      summary: Записать абитуриента на тестирование
      description: Эндпоинт для записи администрацией абитуриента на тестирование
      operationId: signUpUserToTd
      parameters:
        - name: userId
          in: path
          description: Id абитуриента для записи
          required: true
          schema:
            type: integer
            format: int64
        - name: tdId
          in: path
          description: Id даты тестирования для записи
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: ОК
        404:
          description: Не найдены пользователь/дата тестирования с таким Id
        500:
          description: Ошибка сервера
  /td/signUpMe/{tdId}:
    post:
      tags:
        - TestDate
      summary: Записаться на тестирование
      description: Эндпоинт для самостоятельной записи абитуриента на тестирование
      operationId: signUpMeToTd
      parameters:
        - name: tdId
          in: path
          description: Id даты тестирования для записи
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: ОК
        404:
          description: Не найдены пользователь/дата тестирования с таким Id
        500:
          description: Ошибка сервера
  /profiles/create:
    post:
      tags:
        - Profiles
      summary: Создать новый профиль
      description: Эндпоинт для создания нового профиля администрацией
      operationId: createProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Profile'
      responses:
        200:
          description: Профиль успешно создан
        400:
          description: Ошибка валидации
        500:
          description: Ошибка сервера
  /profiles/byId/{id}:
    get:
      tags:
        - Profiles
      summary: Получить полную информацию о профиле
      description: Эндпоинт для получения полной информации о профиле
      operationId: getProfile
      parameters:
        - name: id
          in: path
          description: Id профиля
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileFull'
        404:
          description: Профиль с таким Id не найден
        500:
          description: Ошибка сервера
    put:
      tags:
        - Profiles
      summary: Обновить профиль
      description: Эндпоинт для для обновления профиля администрацией
      operationId: updateProfile
      parameters:
        - name: id
          in: path
          description: Id профиля
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Profile'
      responses:
        200:
          description: ОК
        404:
          description: Профиль/предмет с таким Id не найден
        500:
          description: Ошибка сервера
  /profiles/list:
    get:
      tags:
        - Profiles
      summary: Получить список профилей
      description: Эндпоинт для получения списка профилей
      operationId: listSubjects
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileFull'
        500:
          description: Ошибка сервера
  /profiles/setToUser/{userId}:
    post:
      tags:
        - Profiles
      summary: Установить профили для пользователя
      description: Эндпоинт для выбора администрацией профиля пользователя по id
      operationId: setProfiles
      parameters:
        - name: userId
          in: path
          description: Id пользователя
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetProfilesRequest'
      responses:
        200:
          description: ОК
        404:
          description: Пользователь/профиль с таким Id не найден
        500:
          description: Ошибка сервера
  /profiles/setToMe:
    post:
      tags:
        - Profiles
      summary: Установить профили для себя
      description: Эндпоинт для выбора абитуриентом профилей
      operationId: setMyProfiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetProfilesRequest'
      responses:
        200:
          description: ОК
        404:
          description: Пользователь/профиль с таким Id не найден
        500:
          description: Ошибка сервера
  /subjects/create:
    post:
      tags:
        - Subjects
      summary: Создать новый предмет
      description: Эндпоинт для создания нового предмета администрацией
      operationId: createSubject
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subject'
      responses:
        200:
          description: Предмет успешно создан
        400:
          description: Ошибка валидации
        500:
          description: Ошибка сервера
  /subjects/byId/{id}:
    get:
      tags:
        - Subjects
      summary: Получить предмет
      description: Эндпоинт для получения информации о предмете
      operationId: getSubjectById
      parameters:
        - name: id
          in: path
          description: Id предмета
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: ОК
          content:
            applications/json:
              schema:
                $ref: '#/components/schemas/SubjectFull'
        404:
          description: Предмет с таким Id не найден
        500:
          description: Ошибка сервера
    put:
      tags:
        - Subjects
      summary: Обновить предмет
      description: Эндпоинт для обновления информации о предмете администрацией
      operationId: updateSubjectById
      parameters:
        - name: id
          in: path
          description: Id предмета
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subject'
      responses:
        200:
          description: ОК
        404:
          description: Предмет с таким Id не найден
        500:
          description: Ошибка сервера
  /subjects/list:
    get:
      tags:
        - Subjects
      summary: Получить список предметов
      description: Эндпоинт для получения списка предметов
      operationId: listSubjects
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubjectFull'
        500:
          description: Ошибка сервера
  /fl/create:
    post:
      tags:
        - ForeignLanguages
      summary: Создать иностранный язык
      description: Эндпоинт для создания администрацией иностранного языка
      operationId: createFL
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subject'
      responses:
        200:
          description: OK
        400:
          description: Ошибка валидации запроса
        500:
          description: Ошибка сервера
  /fl/byId/{id}:
    get:
        tags:
          - ForeignLanguages
        summary: Получить иностранный язык
        description: Эндпоинт для получения иностранного языка по Id
        operationId: getFLById
        parameters:
          - name: id
            in: path
            description: Id иностранного языка
            required: true
            schema:
              type: integer
              format: int64
        responses:
          200:
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/IdName'
          404:
            description: Иностранный язык с таким Id не найден
          500:
            description: Ошибка сервера
    put:
      tags:
        - ForeignLanguages
      summary: Обновить иностранный язык
      description: Эндпоинт для обновления иностранного языка администацией
      operationId: updateFL
      parameters:
        - name: id
          in: path
          description: Id иностранного языка
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subject'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdName'
        400:
          description: Ошибка валидации запроса
        500:
          description: Ошибка сервера
  /fl/list:
    get:
      tags:
        - ForeignLanguages
      summary: Получить список иностранных языков
      description: Эндпоинт для получения списка иностранных языков
      operationId: listForeignLanguages
      responses:
        200:
          description: ОК
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdName'
        500:
          description: Ошибка сервера
  /fl/setToUser/{userId}/{languageId}:
    post:
      tags:
        - ForeignLanguages
      summary: Установить иностранный язык для пользователя
      description: Эндпоинт для установки администрацией иностранного языка абитуриенту
      operationId: setForeignLanguageToUser
      parameters:
        - name: userId
          in: path
          description: Id предмета
          required: true
          schema:
            type: integer
            format: int64
        - name: languageId
          in: path
          description: Id предмета
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: OK
        404:
          description: Язык/Пользователь с таким Id не найден
        500:
          description: Ошибка сервера
  /fl/setToMe/{languageId}:
    post:
      tags:
        - ForeignLanguages
      summary: Установить иностранный язык для меня
      description: Эндпоинт для установки абитуриентом иностранного языка для себя
      operationId: setForeignLanguageToMe
      parameters:
        - name: languageId
          in: path
          description: Id предмета
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: OK
        404:
          description: Язык/Пользователь с таким Id не найден
        500:
          description: Ошибка сервера
components:
  schemas:
    SignUp:
      type: object
      properties:
        email:
          type: string
          format: email
          example: email@example.com
        password:
          type: string
          format: password
          example: 12354678
        fio:
          type: string
          example: Фамилия Имя Отчествович
        date_of_birth:
          type: string
          format: date
          example: 01.01.2002
        gender:
          type: string
          example: male
          enum:
            - male
            - female
        phone_number:
          type: string
          example: +79991113333
        parent_phone_number:
          type: string
          example: +79991113333
        current_school:
          type: string
          example: Школа №1
        education_year:
          type: integer
          format: int64
          example: 10
    SignIn:
      type: object
      properties:
        email:
          type: string
          format: email
          example: email@example.com
        password:
          type: string
          format: password
          example: 12354678
    UserFull:
      type: object
      properties:
        id:
          type: integer
          example: 48
        email:
          type: string
          format: email
          example: email@example.com
        fio:
          type: string
          example: Фамилия Имя Отчествович
        date_of_birth:
          type: string
          format: date
          example: 01.01.2002
        gender:
          type: string
          example: male
          enum:
            - male
            - female
        phone_number:
          type: string
          example: +79991113333
        additional_phone_number:
          type: string
          example: +79991113333
        current_school:
          type: string
          example: Школа №1
        additional_email:
          type: string
          format: email
          example: email@example.com
        education_year:
          type: integer
          format: int64
          example: 10
        first_profile:
          type: string
